name: pawmap_vietnam
description: A new Flutter project for PawMap Vietnam.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.5.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  geolocator: ^13.0.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  flutter_svg: ^2.0.0
  google_fonts: ^6.0.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# ─── Flutter Native Splash Config ────────────────────────────────────────────
flutter_native_splash:
  # Màu nền splash screen (trắng sạch)
  color: "#FFFFFF"

  # Logo ứng dụng — tự động resize về mọi kích thước
  image: assets/images/splash_logo.png

  # Android 12+ Adaptive Icon (logo nhỏ hơn, nền màu)
  android_12:
    image: assets/images/splash_logo.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/images/splash_logo.png
    icon_background_color_dark: "#1A1A2E"
    color_dark: "#1A1A2E"

  # Dark mode
  color_dark: "#1A1A2E"
  image_dark: assets/images/splash_logo.png

  # Web
  web: false

  # Giữ splash cho đến khi app sẵn sàng
  android: true
  ios: true
